version: '3.8'

services:
  # PostgreSQL - реляционная база данных
  postgres:
    image: postgres:15-alpine
    container_name: skud-postgres
    environment:
      POSTGRES_DB: scud
      POSTGRES_USER: scud
      POSTGRES_PASSWORD: scud
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - skud-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scud"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Milvus - векторная база данных для эмбеддингов
  milvus:
    image: milvusdb/milvus:v2.3.3
    container_name: skud-milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MILVUS_LOG_LEVEL: info
    depends_on:
      - etcd
    volumes:
      - milvus_data:/var/lib/milvus
    networks:
      - skud-network
    command: ["milvus", "run", "standalone"]

  # Etcd - хранилище метаданных для Milvus
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: skud-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - skud-network

  # Backend - FastAPI приложение
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skud-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://scud:scud@postgres:5432/scud
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - ARCFACE_MODEL=/app/models/arcface_r100.onnx
      - LIVENESS_MODEL=/app/models/liveness.onnx
    volumes:
      - ./backend:/app
      - ./models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      milvus:
        condition: service_started
    networks:
      - skud-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  milvus_data:
  etcd_data:

networks:
  skud-network:
    driver: bridge